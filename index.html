      deleteBtn: { padding: "4px 10px", background: "#ef4444", color: "#fff", border: "none", borderRadius: 4, cursor: "pointer" }
    };

    // ── Date helpers ───────────────────────────────────────────────────────
    // Determine the status of an abstract deadline relative to the current day.
    const TODAY = new Date();
    function deadlineStatus(dl) {
      if (!dl || dl === "TBD") return "upcoming";
      const clean = dl.replace(/\s*\(.*?\)/g, "").trim();
      const d = new Date(clean);
      if (isNaN(d)) return "upcoming";
      const diff = Math.ceil((d - TODAY) / (1000 * 60 * 60 * 24));
      if (diff < 0) return "past";
      if (diff <= 30) return "soon";
      return "upcoming";
    }

    // ── Modal component ────────────────────────────────────────────────────
    function Modal({ title, onClose, children }) {
      return (
        <div style={S.modal} onClick={onClose}>
          <div style={S.modalBox} onClick={e => e.stopPropagation()}>
            <button style={S.closeBtn} onClick={onClose}>×</button>
            <div style={S.modalTitle}>{title}</div>
            {children}
          </div>
        </div>
      );
    }

    // ── Forms ──────────────────────────────────────────────────────────────
    function ProjectForm({ initial, onSave, onDelete, onClose }) {
      const [form, setForm] = useState(initial || { name: "", lead: "", attending: "" });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      return (
        <>
          <label style={S.label}>Project Name</label>
          <input style={S.input} value={form.name} onChange={e => set("name", e.target.value)} placeholder="e.g. Laparoscopic vs Robotic Outcomes" />
          <label style={S.label}>Resident / Project Lead</label>
          <input style={S.input} value={form.lead} onChange={e => set("lead", e.target.value)} placeholder="e.g. Dr. A. Smith" />
          <label style={S.label}>Attending Lead</label>
          <input style={S.input} value={form.attending} onChange={e => set("attending", e.target.value)} placeholder="e.g. Dr. B. Jones" />
          <div style={S.modalActions}>
            {onDelete && <button style={S.deleteBtn} onClick={onDelete}>Delete</button>}
            <button style={S.cancelBtn} onClick={onClose}>Cancel</button>
            <button style={S.saveBtn} onClick={() => { if (form.name.trim()) onSave(form); }}>Save</button>
          </div>
        </>
      );
    }
    function ConferenceForm({ initial, onSave, onDelete, onClose }) {
      const [form, setForm] = useState(initial || { name: "", abstractDeadline: "", dates: "", location: "", submissionUrl: "" });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      return (
        <>
          <label style={S.label}>Conference Name</label>
          <input style={S.input} value={form.name} onChange={e => set("name", e.target.value)} placeholder="e.g. ASCRS Annual Meeting 2027" />
          <label style={S.label}>Abstract Deadline</label>
          <input style={S.input} value={form.abstractDeadline} onChange={e => set("abstractDeadline", e.target.value)} placeholder="e.g. Oct 1, 2026" />
          <label style={S.label}>Conference Dates</label>
          <input style={S.input} value={form.dates} onChange={e => set("dates", e.target.value)} placeholder="e.g. May 3–7, 2027" />
          <label style={S.label}>Location</label>
          <input style={S.input} value={form.location} onChange={e => set("location", e.target.value)} placeholder="e.g. Nashville, TN" />
          <label style={S.label}>Abstract Submission URL</label>
          <input style={S.input} value={form.submissionUrl} onChange={e => set("submissionUrl", e.target.value)} placeholder="https://conference-site.org/abstract-submission" type="url" />
          <div style={S.modalActions}>
            {onDelete && <button style={S.deleteBtn} onClick={onDelete}>Delete</button>}
            <button style={S.cancelBtn} onClick={onClose}>Cancel</button>
            <button style={S.saveBtn} onClick={() => { if (form.name.trim()) onSave(form); }}>Save</button>
          </div>
        </>
      );
    }

    // ── Specialty card ─────────────────────────────────────────────────────
    function SpecialtyCard({ specialty, onUpdate }) {
      const [open, setOpen] = useState(false);
      const [modal, setModal] = useState(null);
      // Generate the next ID for a project or conference. Uses the maximum
      // existing id plus one. Works even if arrays are empty.
      const nextId = arr => Math.max(0, ...arr.map(i => i.id ?? 0)) + 1;

      // Save project: update local state and persist changes to Firestore.
      const saveProject = data => {
        const updatedProjects = modal?.id
          ? specialty.projects.map(p => p.id === modal.id ? { ...p, ...data } : p)
          : [...specialty.projects, { id: nextId(specialty.projects), ...data }];
        const updatedSpec = { ...specialty, projects: updatedProjects };
        onUpdate(updatedSpec);
        setModal(null);
      };
      // Delete project and persist changes.
      const deleteProject = id => {
        const updatedSpec = { ...specialty, projects: specialty.projects.filter(p => p.id !== id) };
        onUpdate(updatedSpec);
        setModal(null);
      };
      // Save conference: update state and persist changes.
      const saveConference = data => {
        const updatedConfs = modal?.id
          ? specialty.conferences.map(c => c.id === modal.id ? { ...c, ...data } : c)
          : [...specialty.conferences, { id: nextId(specialty.conferences), ...data }];
        const updatedSpec = { ...specialty, conferences: updatedConfs };
        onUpdate(updatedSpec);
        setModal(null);
      };
      // Delete conference.
      const deleteConference = id => {
        const updatedSpec = { ...specialty, conferences: specialty.conferences.filter(c => c.id !== id) };
        onUpdate(updatedSpec);
        setModal(null);
      };
      return (
        <>
          <div style={S.card}>
            <div style={S.cardHeader(specialty.color)} onClick={() => setOpen(o => !o)}>
              <span style={S.cardIcon}>{specialty.icon}</span>
              <span style={S.cardTitle}>{specialty.name}</span>
              <span style={S.chevron(open)}>▾</span>
            </div>
            {open && (
              <div style={S.cardBody}>
                {/* Projects */}
                <div style={S.sectionHead}>
                  <span style={S.sectionHeadLabel}>📄 Research Projects ({specialty.projects.length})</span>
                  <button style={S.addBtn} onClick={() => setModal({ type: "project" })}>+ Add</button>
                </div>
                {specialty.projects.length === 0 && <div style={{ color: "#9ca3af", fontSize: 12, fontFamily: "Arial", marginBottom: 10 }}>No projects yet.</div>}
                {specialty.projects.map(p => (
                  <div key={p.id} style={S.projectRow}>
                    <button style={S.editBtn} title="Edit" onClick={() => setModal({ type: "project", id: p.id, ...p })}>✏️</button>
                    <div style={S.projectName}>{p.name}</div>
                    <div style={S.projectMeta}><span style={S.metaLabel}>Resident Lead:</span> {p.lead}</div>
                    <div style={S.projectMeta}><span style={S.metaLabel}>Attending:</span> {p.attending}</div>
                  </div>
                ))}
                {/* Conferences */}
                <div style={{ ...S.sectionHead, marginTop: 8 }}>
                  <span style={S.sectionHeadLabel}>🗓️ Conferences ({specialty.conferences.length})</span>
                  <button style={S.addBtn} onClick={() => setModal({ type: "conference" })}>+ Add</button>
                </div>
                <div style={S.legend}>
                  <span style={S.badge("#fef3c7", "#92400e")}>⏰ Upcoming</span>
                  <span style={S.badge("#fee2e2", "#b91c1c")}>🔴 Due &lt;30d</span>
                  <span style={S.badge("#f3f4f6", "#9ca3af")}>✓ Passed</span>
                </div>
                {specialty.conferences.length === 0 && <div style={{ color: "#9ca3af", fontSize: 12, fontFamily: "Arial" }}>No conferences yet.</div>}
                {specialty.conferences.map(c => {
                  const status = deadlineStatus(c.abstractDeadline);
                  const [bg, fg] = status === "past" ? ["#f3f4f6", "#9ca3af"] : status === "soon" ? ["#fee2e2", "#b91c1c"] : ["#fef3c7", "#92400e"];
                  const icon = status === "past" ? "✓" : status === "soon" ? "🔴" : "⏰";
                  return (
                    <div key={c.id} style={S.confRow(status === "past")}> 
                      <button style={S.editBtn} title="Edit" onClick={() => setModal({ type: "conference", id: c.id, ...c })}>✏️</button>
                      <div style={S.confName}>{c.name}</div>
                      <div>
                        <span style={S.badge(bg, fg)}>{icon} Abstract: {c.abstractDeadline}</span>
                        <span style={S.badge("#dbeafe", "#1e3a8a")}>📅 {c.dates}</span>
                      </div>
                      {c.location && <div style={S.confMeta}>📍 {c.location}</div>}
                      {c.submissionUrl && (
                        <a href={c.submissionUrl} target="_blank" rel="noopener noreferrer" style={S.submitLink}>🔗 Submit Abstract</a>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {/* Render modals for editing or creating projects and conferences */}
          {modal?.type === "project" && (
            <Modal title={modal.id ? "Edit Research Project" : "Add Research Project"} onClose={() => setModal(null)}>
              <ProjectForm
                initial={modal.id ? { name: modal.name, lead: modal.lead, attending: modal.attending } : null}
                onSave={saveProject}
                onDelete={modal.id ? () => deleteProject(modal.id) : null}
                onClose={() => setModal(null)}
              />
            </Modal>
          )}
          {modal?.type === "conference" && (
            <Modal title={modal.id ? "Edit Conference" : "Add Conference"} onClose={() => setModal(null)}>
              <ConferenceForm
                initial={modal.id ? { name: modal.name, abstractDeadline: modal.abstractDeadline, dates: modal.dates, location: modal.location, submissionUrl: modal.submissionUrl || "" } : null}
                onSave={saveConference}
                onDelete={modal.id ? () => deleteConference(modal.id) : null}
                onClose={() => setModal(null)}
              />
            </Modal>
          )}
        </>
      );
    }

    // ── Main application component ─────────────────────────────────────────
    function App() {
      const [specialties, setSpecialties] = useState([]);
      const [search, setSearch] = useState("");

      // Subscribe to Firestore changes. Whenever the `specialties` collection
      // changes (additions, updates, deletions), the callback runs and
      // updates local state. Documents should have their IDs equal to the
      // specialty identifiers (e.g. "colorectal") and contain the fields
      // name, icon, color, projects (array) and conferences (array).
      useEffect(() => {
        const unsubscribe = db.collection('specialties').onSnapshot(snapshot => {
          // If the snapshot has no documents, seed Firestore with the
          // initial specialties defined above. This only runs once on
          // first load when the database is empty. After seeding, we
          // update local state with the same data. If there are existing
          // documents, we simply map them to our local state.
          if (snapshot.empty) {
            initialSpecialties.forEach(spec => {
              const { id, ...docData } = spec;
              db.collection('specialties').doc(id).set(docData);
            });
            setSpecialties(initialSpecialties);
          } else {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setSpecialties(data);
          }
        });
        return () => unsubscribe();
      }, []);

      // Persist updates to Firestore. A call to onUpdate will update local
      // state (for immediate UI feedback) and then write the full document
      // back to Firestore. Firestore will merge fields by default when
      // passing an object, but here we replace the entire document content.
      const update = updated => {
        setSpecialties(prev => prev.map(s => s.id === updated.id ? updated : s));
        // Copy the object minus its id property (ID is used as the document
        // identifier; storing it as a field is redundant). Destructure to
        // remove id before saving.
        const { id, ...docData } = updated;
        db.collection('specialties').doc(id).set(docData);
      };

      // Filter specialties based on search term. Searches match specialty
      // names, project names, and conference names (case-insensitive).
      const q = search.toLowerCase();
      const filtered = specialties.filter(s =>
        s.name.toLowerCase().includes(q) ||
        (s.projects ?? []).some(p => p.name.toLowerCase().includes(q)) ||
        (s.conferences ?? []).some(c => c.name.toLowerCase().includes(q))
      );

      const totalProjects = specialties.reduce((a, s) => a + (s.projects?.length || 0), 0);
      const totalConfs = specialties.reduce((a, s) => a + (s.conferences?.length || 0), 0);

      return (
        <div style={S.page}>
          {/* Header */}
          <div style={S.header}>
            <span style={S.headerIcon}>🏥</span>
            <div style={S.headerText}>
              <h1 style={S.title}>JSUMC Surgery Research</h1>
              <div style={S.subtitle}>Jersey Shore University Medical Center — Department of Surgery</div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <div style={{ ...S.headerBadge, color: "#c8a84b" }}>{specialties.length} Subspecialties</div>
              <div style={{ ...S.headerBadge, color: "#a8d8c8" }}>{totalProjects} Active Projects</div>
              <div style={{ ...S.headerBadge, color: "#bfdbfe" }}>{totalConfs} Conferences</div>
            </div>
          </div>
          {/* Body */}
          <div style={S.body}>
            <input
              style={S.searchInput}
              placeholder="🔍  Search subspecialties, projects, or conferences..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <div style={S.sectionLabel}>Surgical Subspecialties — Click any card to expand</div>
            <div style={S.grid}>
              {filtered.map(s => <SpecialtyCard key={s.id} specialty={s} onUpdate={update} />)}
            </div>
            {filtered.length === 0 && (
              <div style={{ color: "#9ca3af", fontFamily: "Arial", fontSize: 15, textAlign: "center", marginTop: 60 }}>
                No results found for "{search}"
              </div>
            )}
            <div style={{ marginTop: 48, borderTop: "1px solid #e5eaf2", paddingTop: 22, color: "#9ca3af", fontSize: 11, fontFamily: "Arial", textAlign: "center" }}>
              JSUMC Surgery Research Portal · Changes are saved to the shared database in real time
            </div>
          </div>
        </div>
      );
    }

    // ── Mount application ────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
